spring:
  application:
    name: stream-party-planner-backend
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:stream_party}
    username: ${POSTGRES_USER:stream_party_local}
    password: ${POSTGRES_PASSWORD:stream_party_local_password}
