name: Security CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: "25"
  NODE_VERSION: "24"
  DEPENDENCY_CHECK_VERSION: "12.2.2"
  DEPENDENCY_CHECK_FAIL_CVSS: "7"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-security:
    name: Frontend dependency audit
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    defaults:
      run:
        shell: bash
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend dependency audit
        run: |
          set -o pipefail
          npm audit --audit-level=high | tee npm-audit-report.txt

      - name: Upload frontend dependency audit report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: frontend-npm-audit-report
          path: frontend/npm-audit-report.txt
          if-no-files-found: ignore
          retention-days: 7

  backend-security:
    name: Backend dependency audit
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    defaults:
      run:
        shell: bash
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Set OWASP Dependency-Check cache key
        run: echo "DEPENDENCY_CHECK_CACHE_WEEK=$(date -u +'%G-W%V')" >> "$GITHUB_ENV"

      - name: Restore OWASP Dependency-Check data cache
        uses: actions/cache@v5
        with:
          path: ~/.dependency-check
          key: dependency-check-data-${{ runner.os }}-${{ env.DEPENDENCY_CHECK_CACHE_WEEK }}-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            dependency-check-data-${{ runner.os }}-

      - name: Verify NVD API key is configured
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [[ -z "${NVD_API_KEY}" ]]; then
            echo "NVD_API_KEY secret is required for OWASP Dependency-Check."
            exit 1
          fi

      - name: Run backend dependency audit
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          ./mvnw --batch-mode --no-transfer-progress \
            org.owasp:dependency-check-maven:${DEPENDENCY_CHECK_VERSION}:check \
            -DskipTests \
            -DfailBuildOnCVSS="${DEPENDENCY_CHECK_FAIL_CVSS}" \
            -Dformat=HTML \
            -DnvdApiKey="${NVD_API_KEY}" \
            -DnvdApiDelay=3500 \
            -DdataDirectory="${HOME}/.dependency-check"

      - name: Upload backend dependency audit report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: backend-dependency-check-report
          path: backend/target/dependency-check-report.html
          if-no-files-found: ignore
          retention-days: 7
