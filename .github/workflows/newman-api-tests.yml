name: API CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: "25"
  NODE_VERSION: "24"
  NEWMAN_VERSION: "6.2.2"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: Newman API tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:18
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: stream_party_ci
          POSTGRES_USER: stream_party_ci
          POSTGRES_PASSWORD: stream_party_ci_password
        options: >-
          --health-cmd "pg_isready -U stream_party_ci -d stream_party_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend package
        run: |
          cd backend
          ./mvnw --batch-mode --no-transfer-progress package -DskipTests

      - name: Start backend
        env:
          SPRING_PROFILES_ACTIVE: dev
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: stream_party_ci
          POSTGRES_USER: stream_party_ci
          POSTGRES_PASSWORD: stream_party_ci_password
        run: |
          java -jar backend/target/*.jar > backend-newman.log 2>&1 &
          echo $! > backend-newman.pid

      - name: Wait for backend health
        run: |
          for attempt in {1..90}; do
            if curl --fail --silent --show-error http://localhost:8080/actuator/health > /dev/null; then
              echo "Backend is healthy."
              exit 0
            fi

            echo "Waiting for backend health check... attempt ${attempt}/90"
            sleep 2
          done

          echo "Backend did not become healthy within 180 seconds."
          if [[ -f backend-newman.log ]]; then
            echo "Last backend log lines:"
            tail -n 200 backend-newman.log
          fi
          exit 1

      - name: Run Newman collection
        run: |
          npx --yes newman@${NEWMAN_VERSION} run postman/StreamPartyPlanner.postman_collection.json \
            -e postman/local.postman_environment.json \
            --reporters cli,junit,json \
            --reporter-junit-export newman-results.xml \
            --reporter-json-export newman-results.json

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: newman-api-test-reports
          path: |
            newman-results.xml
            newman-results.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload backend log
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: backend-newman-log
          path: backend-newman.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop backend
        if: always()
        run: |
          if [[ -f backend-newman.pid ]]; then
            kill "$(cat backend-newman.pid)" 2>/dev/null || true
          fi
