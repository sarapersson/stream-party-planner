name: Newman API tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  newman:
    name: Newman API tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    defaults:
      run:
        shell: bash

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: stream_party
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d stream_party"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Start backend
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: dev
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: stream_party
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        run: |
          ./mvnw --batch-mode --no-transfer-progress spring-boot:run > ../backend-newman.log 2>&1 &
          echo "$!" > ../backend-newman.pid

      - name: Wait for backend health
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent --show-error http://localhost:8080/actuator/health; then
              echo
              echo "Backend is healthy."
              exit 0
            fi

            backend_pid="$(< backend-newman.pid)"
            if ! kill -0 "$backend_pid" 2>/dev/null; then
              echo "Backend process exited before becoming healthy."
              echo "Backend log:"
              cat backend-newman.log
              exit 1
            fi

            echo "Waiting for backend health (${attempt}/60)..."
            sleep 5
          done

          echo "Backend did not become healthy within the expected time."
          echo "Backend log:"
          cat backend-newman.log
          exit 1

      - name: Run Newman collection
        run: |
          npx --yes newman run postman/StreamPartyPlanner.postman_collection.json \
            -e postman/local.postman_environment.json

      - name: Stop backend
        if: always()
        run: |
          if [[ -f backend-newman.pid ]]; then
            backend_pid="$(< backend-newman.pid)"
            kill "$backend_pid" 2>/dev/null || true
          fi
