name: Playwright E2E CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: "25"
  NODE_VERSION: "24"
  E2E_BASE_URL: http://127.0.0.1:5173
  E2E_API_BASE_URL: http://127.0.0.1:8080

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E tests
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:18
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: stream_party_ci
          POSTGRES_USER: stream_party_ci
          POSTGRES_PASSWORD: stream_party_ci_password
        options: >-
          --health-cmd "pg_isready -U stream_party_ci -d stream_party_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Build backend package
        run: |
          cd backend
          ./mvnw --batch-mode --no-transfer-progress package -DskipTests

      - name: Start backend
        env:
          SPRING_PROFILES_ACTIVE: dev
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: stream_party_ci
          POSTGRES_USER: stream_party_ci
          POSTGRES_PASSWORD: stream_party_ci_password
        run: |
          java -jar backend/target/*.jar > backend-playwright.log 2>&1 &
          echo $! > backend-playwright.pid

      - name: Wait for backend health
        run: |
          for attempt in {1..90}; do
            if curl --fail --silent --show-error http://localhost:8080/actuator/health > /dev/null; then
              echo "Backend is healthy."
              exit 0
            fi

            echo "Waiting for backend health check... attempt ${attempt}/90"
            sleep 2
          done

          echo "Backend did not become healthy within 180 seconds."
          if [[ -f backend-playwright.log ]]; then
            echo "Last backend log lines:"
            tail -n 200 backend-playwright.log
          fi
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-test-results
          path: frontend/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright JUnit report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-junit-report
          path: frontend/playwright-results.xml
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload backend log
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: backend-playwright-log
          path: backend-playwright.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop backend
        if: always()
        run: |
          if [[ -f backend-playwright.pid ]]; then
            kill "$(cat backend-playwright.pid)" 2>/dev/null || true
          fi
