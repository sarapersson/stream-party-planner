services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required. Copy .env.example to .env or pass --env-file .env.}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required. Copy .env.example to .env or pass --env-file .env.}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required. Copy .env.example to .env or pass --env-file .env.}
    ports:
      - "${POSTGRES_PORT:?POSTGRES_PORT is required. Copy .env.example to .env or pass --env-file .env.}:5432"
    volumes:
      - stream_party_postgres_data:/var/lib/postgresql

volumes:
  stream_party_postgres_data:
